<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#0D0D0F;color:#fff;height:100vh;overflow:hidden}

/* ── TOP BAR ── */
#topbar{height:56px;background:#18181C;border-bottom:1px solid #2A2A30;display:flex;align-items:center;padding:0 20px;gap:0;position:fixed;top:0;left:0;right:0;z-index:200}
.tb-logo{font-size:15px;font-weight:800;color:#fff;margin-right:20px;white-space:nowrap}.tb-logo span{color:#CDFF00}
.flow-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none}
.flow-tabs::-webkit-scrollbar{display:none}
.ftab{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ftab:hover{background:#222228}
.ftab.active{background:#CDFF0015;border-color:#CDFF0044;color:#fff}
.ftab .fi{font-size:14px}
.ftab .fl{font-size:10px;font-weight:700;color:#888}
.ftab.active .fl{color:#CDFF00}
.ftab .fn{font-size:11px;font-weight:700;color:#ccc}
.ftab.active .fn{color:#fff}
.opt-toggle{display:flex;gap:2px;margin-left:16px;background:#111;border:1px solid #2A2A30;border-radius:8px;padding:3px;flex-shrink:0}
.ot-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:#666;border:none;background:transparent}
.ot-btn.a1{background:#CDFF00;color:#000}
.ot-btn.a2{background:#7C3AED;color:#fff}

/* ── MAIN LAYOUT ── */
#main{display:flex;height:calc(100vh - 56px);margin-top:56px}

/* ── SIDEBAR ── */
#sidebar{width:220px;flex-shrink:0;background:#18181C;border-right:1px solid #2A2A30;overflow-y:auto;padding:14px 0 80px;display:flex;flex-direction:column}
.sl{font-size:10px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;padding:6px 16px 4px}
.si{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.si:hover{background:#222228}
.si.active{border-left-color:#CDFF00;background:#CDFF0015}
.si.done{border-left-color:#059669}
.si .sn{width:20px;height:20px;border-radius:50%;background:#2A2A30;color:#666;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.si.active .sn{background:#CDFF00;color:#000}
.si.done .sn{background:#059669;color:#fff}
.si .st .la{font-size:11px;font-weight:600;color:#aaa;line-height:1.3}
.si .st .su{font-size:10px;color:#444;margin-top:2px}
.si.active .st .la{color:#fff}

/* ── CENTER ── */
#center{flex:1;display:flex;align-items:center;justify-content:center;background:#111}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
/* ── DIAGRAM MODE ── */
#diag-wrap{display:none;width:100%;height:100%;overflow-y:auto;padding:28px 36px;background:#0D0D10;box-sizing:border-box}
.fc-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.fc-subtitle{font-size:12px;color:#666;margin-bottom:28px}
.fc-phase{font-size:10px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin:20px 0 10px;padding-left:12px;border-left:3px solid #333}
.fc-row{display:flex;align-items:flex-start;gap:16px;margin-bottom:0}
.fc-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.fc-node{border-radius:10px;padding:9px 16px;font-size:11px;font-weight:600;text-align:center;min-width:220px;max-width:280px;line-height:1.4;position:relative}
.fc-start{background:#1E1E24;border:1.5px solid #444;color:#aaa}
.fc-proc{background:#1A2640;border:1.5px solid #2563EB55;color:#93C5FD}
.fc-proc-green{background:#052E16;border:1.5px solid #059669;color:#6EE7B7}
.fc-proc-red{background:#2D0A0A;border:1.5px solid #DC2626;color:#FCA5A5}
.fc-proc-orange{background:#2D1A06;border:1.5px solid #D97706;color:#FCD34D}
.fc-proc-purple{background:#1A0A2E;border:1.5px solid #7C3AED;color:#C4B5FD}
.fc-decision{background:#1A1A08;border:1.5px solid #CA8A04;color:#FDE047;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;min-width:200px;text-align:center;position:relative}
.fc-decision::before{content:"\25C7";position:absolute;left:-10px;top:50%;transform:translateY(-50%);font-size:16px;color:#CA8A04;line-height:1}
.fc-arrow{font-size:14px;color:#444;text-align:center;line-height:1;margin:4px 0;flex-shrink:0}
.fc-arrow-green{color:#059669}
.fc-arrow-red{color:#DC2626}
.fc-side-exit{background:#111318;border:1px dashed #444;border-radius:8px;padding:6px 12px;font-size:10px;color:#666;white-space:nowrap;margin-left:8px;margin-top:4px;align-self:center}
.fc-label-yes{font-size:9px;font-weight:800;color:#059669;letter-spacing:.5px;text-align:center;margin:2px 0}
.fc-label-no{font-size:9px;font-weight:800;color:#EF4444;letter-spacing:.5px}
.fc-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}
.fc-badge-rec{background:#052E16;color:#6EE7B7;border:1px solid #059669}
.fc-badge-norec{background:#2D1A06;color:#FCD34D;border:1px dashed #D97706}
.fc-note-box{background:#1C1200;border:1.5px dashed #D97706;border-radius:10px;padding:8px 14px;font-size:10px;color:#FCD34D;line-height:1.5;max-width:260px;margin-left:12px;align-self:center}
.fc-connector-h{width:24px;height:1.5px;background:#444;align-self:center;flex-shrink:0}
.fc-loop-note{font-size:9px;color:#555;font-style:italic;text-align:center;margin-top:2px}
.opt-label{font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px}
.opt-label.o1{background:#CDFF0022;color:#CDFF00;border:1px solid #CDFF0044}
.opt-label.o2{background:#7C3AED22;color:#9F7AEA;border:1px solid #7C3AED44}
.pf{width:340px;height:680px;background:#000;border-radius:42px;border:7px solid #2A2A30;position:relative;overflow:hidden;box-shadow:0 0 0 1px #111,0 24px 48px rgba(0,0,0,0.7)}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100px;height:24px;background:#000;border-radius:0 0 15px 15px;z-index:10}
.pstat{position:absolute;top:0;left:0;right:0;height:40px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 18px 5px;z-index:9;pointer-events:none}
.pstat .t{font-size:12px;font-weight:700;color:#fff}
.pstat .ic{font-size:10px;color:#fff}
.pscr{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;overflow:hidden;overflow-y:auto;transition:opacity .2s ease}

/* ── NOTES PANEL ── */
#notes{width:320px;flex-shrink:0;background:#18181C;border-right:1px solid #2A2A30;overflow-y:auto;padding:20px;padding-bottom:80px}
#notes::-webkit-scrollbar{width:4px}
#notes::-webkit-scrollbar-thumb{background:#2A2A30;border-radius:2px}
.nstep{font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.ntitle{font-size:16px;font-weight:800;color:#fff;margin-bottom:12px;line-height:1.3}
.actor-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:#1A1A20;border-radius:8px}
.actor-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:10px}
.ac-user{background:#CDFF0022;color:#CDFF00;border:1px solid #CDFF0044}
.ac-sys{background:#05966922;color:#34D399;border:1px solid #05966944}
.ac-both{background:#D9770622;color:#FBBF24;border:1px solid #D9770644}

.n-section{margin-bottom:14px}
.n-sec-label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.n-body{font-size:12px;color:#aaa;line-height:1.6}
.n-body b{color:#ddd}

.diff-block{background:#111;border-radius:10px;overflow:hidden;margin-bottom:12px}
.db-header{padding:8px 12px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px}
.db-header.d1{background:#CDFF0018;color:#CDFF00}
.db-header.d2{background:#7C3AED18;color:#9F7AEA}
.db-body{padding:10px 12px;font-size:12px;color:#aaa;line-height:1.5;border-top:1px solid #1C1C22}
.db-body b{color:#ddd}

.key-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.key-item{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#888}
.key-dot{width:6px;height:6px;border-radius:50%;background:#CDFF00;flex-shrink:0;margin-top:5px}
.key-item .kt{color:#aaa;line-height:1.5}
.key-item .kt b{color:#ddd}

.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.tag-new{background:#CDFF0022;color:#CDFF00;border:1px solid #CDFF0033}
.tag-diff{background:#7C3AED22;color:#9F7AEA;border:1px solid #7C3AED33}
.tag-same{background:#1C1C22;color:#555}

/* ── NAV ── */
#navbar{position:fixed;bottom:0;left:540px;right:0;height:60px;background:#18181C;border-top:1px solid #2A2A30;display:flex;align-items:center;justify-content:center;gap:12px;z-index:100}
.nb{padding:9px 20px;border-radius:8px;border:1px solid #2A2A30;background:#222228;color:#ccc;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.nb:hover{background:#2A2A34}
.nb.p{background:#CDFF00;border-color:#CDFF00;color:#000}
.nb:disabled{opacity:0.3;cursor:not-allowed}
.sc{font-size:12px;color:#555;min-width:90px;text-align:center}
.sc strong{color:#aaa}
.sc .flow-indicator{font-size:10px;display:block;margin-top:2px;color:#333;font-weight:600}

/* ── Phase badges (sidebar) ── */
.pbadge{display:inline-flex;align-items:center;font-size:8px;font-weight:800;padding:1px 6px;border-radius:3px;letter-spacing:.4px;margin-top:3px;white-space:nowrap}
.pb-p1{background:#052E16;color:#6EE7B7;border:1px solid #059669}
.pb-p2{background:#0D1E3A;color:#93C5FD;border:1px solid #2563EB55}
.pb-p3{background:#2D1A4E;color:#C4B5FD;border:1px solid #7C3AED55}
.pb-future{background:#1C1200;color:#FCD34D;border:1px dashed #D97706}
.pb-ref{background:#1A1A20;color:#555;border:1px solid #2A2A30}

/* ── Labubu animation ── */
@keyframes labubuBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>

<script>

// ── dark theme helpers ──
var BG = '#000';

var BORDER = '#333';
var TXT = '#fff';
var TXT2 = '#999';
var TXT3 = '#666';
var ACCENT = '#CDFF00';

var RED = '#F87171';

function darkBase(inner) {
  return '<div style="width:100%;height:100%;background:' + BG + ';font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow-y:auto;padding-top:40px;color:' + TXT + ';">' + inner + '</div>';
}

function darkCard(inner) {
  return '<div style="background:' + CARD + ';border:1px solid ' + BORDER + ';border-radius:14px;margin:8px 16px;padding:14px;">' + inner + '</div>';
}

function ctaBtn(text, disabled) {
  var bg = disabled ? '#333' : ACCENT;
  var col = disabled ? '#666' : '#000';
  var cur = disabled ? 'not-allowed' : 'pointer';
  return '<div style="padding:0 16px 16px;"><button style="width:100%;padding:14px;border-radius:12px;border:none;background:' + bg + ';color:' + col + ';font-size:15px;font-weight:700;cursor:' + cur + ';">' + text + '</button></div>';
}

function progressBar(step, total) {
  var pct = Math.round((step / total) * 100);
  return '<div style="padding:12px 16px 0;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:11px;color:' + TXT2 + ';">Step ' + step + ' of ' + total + '</span><span style="font-size:11px;color:' + ACCENT + ';">' + pct + '%</span></div>'
    + '<div style="width:100%;height:4px;background:#222;border-radius:2px;"><div style="width:' + pct + '%;height:100%;background:' + ACCENT + ';border-radius:2px;"></div></div></div>';

// ═══════════════════════════════════════════
//  FLOW 0: SCOPE DIAGRAM

var activeFlow = 0;
var activeStep = 0;
var activeOption = 1;

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function setOption(o) {
  activeOption = o;
  document.getElementById('ot1').className = o === 1 ? 'ot-btn a1' : 'ot-btn';
  document.getElementById('ot2').className = o === 2 ? 'ot-btn a2' : 'ot-btn';
  renderScreen();
  renderNotes();
}

function renderScreen() {
  var flow = flows[activeFlow];
  var step = flow.steps[activeStep];
  var phoneWrap = document.getElementById('phone-wrap');
  var diagWrap = document.getElementById('diag-wrap');
  var optLabel = document.getElementById('opt-label-el');
  var optToggle = document.getElementById('opt-toggle');

  if (flow.isDiagram) {
    phoneWrap.style.display = 'none';
    diagWrap.style.display = 'block';
    diagWrap.innerHTML = step.screen(activeOption);
    optLabel.style.display = 'none';
    optToggle.style.display = 'none';
    return;
  }

  phoneWrap.style.display = 'flex';
  diagWrap.style.display = 'none';

  var scr = document.getElementById('phone-screen');
  scr.style.opacity = '0';
  var o = activeOption;
  setTimeout(function() {
    scr.innerHTML = step.screen(o);
    scr.style.opacity = '1';
  }, 100);

  if (flow.hasOptions && !step.notes.same) {
    optLabel.style.display = 'block';
    optLabel.className = 'opt-label ' + (activeOption === 1 ? 'o1' : 'o2');
    optLabel.textContent = activeOption === 1 ? 'Option 1' : 'Option 2';
    optToggle.style.display = 'flex';
  } else {
    optLabel.style.display = 'none';
    optToggle.style.display = 'none';
  }
}

function renderNotes() {
  var flow = flows[activeFlow];
  var step = flow.steps[activeStep];
  var n = step.notes;

  document.getElementById('notes-step-label').textContent = n.stepLabel || '';
  document.getElementById('notes-title').textContent = n.title || '';

  var actorColors = { user: 'ac-user', system: 'ac-sys', both: 'ac-both', PM: 'ac-both' };
  var actorLabels = { user: 'User Action', system: 'System', both: 'User + System', PM: 'PM Reference' };
  var ar = document.getElementById('notes-actor');
  ar.innerHTML = '<div class="actor-chip ' + (actorColors[n.actor] || 'ac-both') + '">' + (actorLabels[n.actor] || n.actor) + '</div>'
    + '<div class="actor-desc">' + (n.actorDesc || '') + '</div>';

  var html = '';
  if (n.desc) {
    html += '<div class="n-section"><div class="n-sec-label">What Happens</div><div class="n-body">' + n.desc + '</div></div>';
  }

  if (n.opt1 && n.opt2) {
    html += '<div class="n-section"><div class="n-sec-label">Option Comparison <span class="tag tag-diff">Differs</span></div>'
      + '<div class="diff-block"><div class="db-header d1">Option 1</div><div class="db-body">' + n.opt1.body + '</div></div>'
      + '<div class="diff-block"><div class="db-header d2">Option 2</div><div class="db-body">' + n.opt2.body + '</div></div>'
      + '</div>';
  } else if (n.same) {
    html += '<div class="n-section"><div class="n-sec-label">Option Comparison <span class="tag tag-same">Identical</span></div>'
      + '<div class="n-body" style="color:#555;">Both options show the same screen at this step.</div></div>';
  }

  if (n.keys && n.keys.length) {
    html += '<div class="n-section"><div class="n-sec-label">Design Notes</div><div class="key-list">';
    for (var i = 0; i < n.keys.length; i++) {
      html += '<div class="key-item"><div class="key-dot"></div><div class="kt">' + n.keys[i] + '</div></div>';
    }
    html += '</div></div>';
  }

  document.getElementById('notes-body').innerHTML = html;
}

function renderSidebar() {
  var flow = flows[activeFlow];
  document.getElementById('flow-label').textContent = 'Flow ' + flow.num + ' \u2014 ' + flow.label;
  var phLabels  = { p1:'P1', p2:'P2', p3:'P3', future:'Future', ref:'Ref' };
  var phClasses = { p1:'pb-p1', p2:'pb-p2', p3:'pb-p3', future:'pb-future', ref:'pb-ref' };
  var html = '';
  for (var i = 0; i < flow.steps.length; i++) {
    var cls = i === activeStep ? ' active' : (i < activeStep ? ' done' : '');
    var ph = flow.steps[i].phase || flow.phase;
    var badge = ph ? '<span class="pbadge ' + phClasses[ph] + '">' + phLabels[ph] + '</span>' : '';
    html += '<div class="si' + cls + '" onclick="goStep(' + i + ')">'
      + '<div class="sn">' + (i + 1) + '</div>'
      + '<div class="st"><div class="la">' + flow.steps[i].label + '</div><div class="su">' + flow.steps[i].sub + '</div>' + badge + '</div>'
      + '</div>';
  }
  document.getElementById('step-list').innerHTML = html;
}

function renderFlowTabs() {
  var html = '';
  for (var i = 0; i < flows.length; i++) {
    var cls = i === activeFlow ? ' active' : '';
    html += '<div class="ftab' + cls + '" onclick="goFlow(' + i + ')">'
      + '<div class="fi">' + flows[i].icon + '</div>'
      + '<div><div class="fl">' + flows[i].num + '</div><div class="fn">' + flows[i].label + '</div></div>'
      + '</div>';
  }
  document.getElementById('flow-tabs').innerHTML = html;
}

function renderNav() {
  var flow = flows[activeFlow];
  var total = flow.steps.length;
  document.getElementById('nav-info').textContent = (activeStep + 1) + ' / ' + total;
  document.getElementById('nav-flow-label').textContent = flow.label;
  document.getElementById('btn-prev').disabled = activeStep === 0;
  var btnNext = document.getElementById('btn-next');
  if (activeStep === total - 1) {
    btnNext.disabled = true;
    btnNext.textContent = '\u2713 Done';
  } else {
    btnNext.disabled = false;
    btnNext.innerHTML = 'Next \u2192';
  }
}

function renderAll() {
  renderFlowTabs();
  renderSidebar();
  renderScreen();
  renderNotes();
  renderNav();
}

function goFlow(i) {
  activeFlow = i;
  activeStep = 0;
  activeOption = 1;
  document.getElementById('ot1').className = 'ot-btn a1';
  document.getElementById('ot2').className = 'ot-btn';
  renderAll();
}

function goStep(i) {
  activeStep = i;
  renderSidebar();
  renderScreen();
  renderNotes();
  renderNav();
  document.getElementById('notes').scrollTop = 0;
}

function navigate(dir) {
  var flow = flows[activeFlow];
  var next = activeStep + dir;
  if (next < 0 || next >= flow.steps.length) return;
  activeStep = next;
  renderSidebar();
  renderScreen();
  renderNotes();
  renderNav();
  document.getElementById('notes').scrollTop = 0;
}

// ── INIT ────────────────────────────────────────
renderAll();
</script>
</body>
</html>
